name: Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da usare (es: v1.0.02). Lascia vuoto per auto-incremento"
        required: false
        type: string

jobs:
  build-windows:
    name: Build (Windows cross-compile)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Aggiornato alla v4 (stabile)

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install MinGW-w64 cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Download dependencies
        run: go mod tidy

      - name: Build
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "1"
          CC: x86_64-w64-mingw32-gcc
        # Ho aggiunto -ldflags "-s -w" per rendere il file .exe più leggero
        run: go build -tags production -ldflags "-s -w -H windowsgui" -o photo-splitter.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: photo-splitter-windows
          path: photo-splitter.exe
          retention-days: 30

  tag-and-release:
    name: Create Tag and Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: photo-splitter-windows
          path: dist

      - name: Compute and push next tag
        id: tag
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "[bot]"
          git config user.email "[bot]@users.noreply.github.com"
          
          git fetch --tags --force

          if [ -n "${INPUT_TAG:-}" ]; then
            chosen_tag="$INPUT_TAG"
            if git rev-parse "$chosen_tag" >/dev/null 2>&1; then
              echo "Tag gia esistente: $chosen_tag"
            else
              git tag "$chosen_tag" "$GITHUB_SHA"
              git push origin "$chosen_tag"
            fi
            echo "tag=$chosen_tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Logica per il calcolo del tag (la tua è ottima)
          latest="$(git tag -l 'v*' --sort=-v:refname | head -n1 || true)"
          if [ -z "$latest" ]; then
            latest="v1.0.00"
          fi

          version="${latest#v}"
          IFS='.' read -r major minor patch <<< "$version"
          
          next_patch=$(printf "%02d" "$((10#$patch + 1))")
          next_tag="v${major}.${minor}.${next_patch}"

          git tag "$next_tag"
          git push origin "$next_tag"
          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/photo-splitter.exe
          generate_release_notes: true
          