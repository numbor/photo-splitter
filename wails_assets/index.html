<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Splitter Go</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      background: #f5f7fa;
      color: #1f2937;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }
    label {
      font-size: 13px;
      color: #334155;
      margin-bottom: 4px;
      display: block;
    }
    input[type="text"], input[type="number"], select {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: white;
    }
    .row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-top: 10px;
    }
    .checks {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      font-size: 14px;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    button {
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 9px 14px;
      cursor: pointer;
      background: #f8fafc;
    }
    button.primary {
      background: #2563eb;
      border-color: #2563eb;
      color: white;
    }
    button.secondary {
      background: #10b981;
      border-color: #10b981;
      color: white;
    }
    .content {
      margin-top: 14px;
      display: grid;
      grid-template-columns: minmax(320px, 420px) 1fr;
      gap: 16px;
    }
    textarea {
      width: 100%;
      height: 450px;
      resize: none;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px;
      box-sizing: border-box;
      font-family: Consolas, monospace;
      background: #fcfcfd;
    }
    .previews {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 12px;
    }
    .photo-card {
      background: white;
      border: 1px solid #dbe1e8;
      border-radius: 12px;
      padding: 10px;
    }
    .photo-card h4 {
      margin: 0 0 8px;
      font-size: 14px;
      color: #475569;
    }
    .preview {
      width: 100%;
      height: 150px;
      border: 1px solid #dbe1e8;
      border-radius: 8px;
      background: white;
      object-fit: contain;
    }
    .preview-empty {
      width: 100%;
      height: 150px;
      border: 1px solid #dbe1e8;
      border-radius: 8px;
      background: #f8fafc;
      color: #94a3b8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }
    .photo-card button {
      margin-top: 8px;
      width: 120px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="grid">
      <div>
        <label>Cartella output</label>
        <input id="outputPath" type="text" />
      </div>
      <button id="btnPickOutput">Scegli...</button>
    </div>

    <div class="grid" style="margin-top:10px;">
      <div>
        <label>Percorso immagine da elaborare</label>
        <input id="inputPath" type="text" />
      </div>
      <button id="btnPickInput">Apri file...</button>
    </div>

    <div class="row">
      <div>
        <label>JPG Quality</label>
        <input id="jpgQuality" type="number" min="1" max="100" value="90" />
      </div>
      <div>
        <label>DPI scansione TWAIN</label>
        <select id="scanDpi">
          <option value="150">150</option>
          <option value="200">200</option>
          <option value="300" selected>300</option>
          <option value="400">400</option>
          <option value="600">600</option>
        </select>
      </div>
      <div>
        <label>Dispositivo TWAIN (opzionale)</label>
        <input id="scanDevice" type="text" placeholder="Es. Canon LiDE" />
      </div>
      <div>
        <label>Dispositivi TWAIN rilevati</label>
        <select id="scanDeviceList">
          <option value="">(nessun dispositivo caricato)</option>
        </select>
      </div>
    </div>

    <div class="checks">
      <label><input id="autoRotate" type="checkbox" checked /> Ruota automaticamente i crop di 90° a destra</label>
      <label><input id="enhanceCrops" type="checkbox" checked /> Migliora automaticamente i crop</label>
      <label><input id="addBorder" type="checkbox" checked /> Aggiungi bordo bianco all'immagine</label>
    </div>

    <div class="actions">
      <button class="primary" id="btnScanTwain">Scansiona via TWAIN</button>
      <button id="btnLoadTwainDevices">Carica dispositivi TWAIN</button>
      <button class="secondary" id="btnProcess">Elabora file selezionato</button>
      <button id="btnOpenOutput">Apri cartella output</button>
    </div>

    <div class="content">
      <div>
        <label>Log</label>
        <textarea id="log" readonly></textarea>
      </div>
      <div>
        <label>Anteprime foto croppate</label>
        <div class="previews" id="previews"></div>
      </div>
    </div>
  </div>

  <script src="/wails/ipc.js"></script>
  <script src="/wails/runtime.js"></script>
  <script>
    const app = () => window.go.main.DesktopApp;
    const outputPath = document.getElementById("outputPath");
    const inputPath = document.getElementById("inputPath");
    const jpgQuality = document.getElementById("jpgQuality");
    const scanDpi = document.getElementById("scanDpi");
    const scanDevice = document.getElementById("scanDevice");
    const scanDeviceList = document.getElementById("scanDeviceList");
    const autoRotate = document.getElementById("autoRotate");
    const enhanceCrops = document.getElementById("enhanceCrops");
    const addBorder = document.getElementById("addBorder");
    const logBox = document.getElementById("log");
    const previews = document.getElementById("previews");

    const photoPathState = ["", "", "", ""];
    const photoPreviewState = ["", "", "", ""];

    function appendLog(message) {
      const now = new Date();
      const ts = now.toTimeString().slice(0, 8);
      logBox.value += `[${ts}] ${message}\n`;
      logBox.scrollTop = logBox.scrollHeight;
    }

    function renderPreviews() {
      previews.innerHTML = "";
      for (let i = 0; i < 4; i++) {
        const card = document.createElement("div");
        card.className = "photo-card";

        const title = document.createElement("h4");
        title.textContent = `Foto ${i + 1}`;

        let previewElement;
        if (photoPreviewState[i]) {
          const img = document.createElement("img");
          img.className = "preview";
          img.src = photoPreviewState[i];
          previewElement = img;
        } else {
          const empty = document.createElement("div");
          empty.className = "preview-empty";
          empty.textContent = "Nessuna anteprima";
          previewElement = empty;
        }

        const btn = document.createElement("button");
        btn.textContent = "Ruota 90°";
        btn.disabled = !photoPathState[i];
        btn.addEventListener("click", async () => {
          if (!photoPathState[i]) return;
          try {
            appendLog(`Rotazione foto ${i + 1} di 90 gradi...`);
            const updated = await app().RotatePhoto({
              input: photoPathState[i],
              angle: 90,
              jpgQuality: parseInt(jpgQuality.value, 10) || 95,
            });
            photoPathState[i] = updated;
            photoPreviewState[i] = await app().GetPhotoPreviewDataURL(updated);
            renderPreviews();
            appendLog(`Foto ${i + 1} ruotata con successo.`);
          } catch (err) {
            appendLog(`Errore rotazione foto ${i + 1}: ${err}`);
            alert("Rotazione fallita. Controlla il log.");
          }
        });

        card.appendChild(title);
        card.appendChild(previewElement);
        card.appendChild(btn);
        previews.appendChild(card);
      }
    }

    async function updateResult(result) {
      const photos = result.photos || [];
      for (let i = 0; i < 4; i++) {
        const photoPath = photos[i] || "";
        photoPathState[i] = photoPath;
        photoPreviewState[i] = photoPath ? await app().GetPhotoPreviewDataURL(photoPath) : "";
      }
      renderPreviews();
      (result.logs || []).forEach(appendLog);
      if (result.outputDir) appendLog(`OUTPUT_DIR=${result.outputDir}`);
      if (result.borderedPath) appendLog(`BORDERED=${result.borderedPath}`);
      photos.forEach((path) => appendLog(`PHOTO=${path}`));
      alert("Operazione completata.");
    }

    async function loadDefaults() {
      outputPath.value = await app().DefaultOutputDir();
      renderPreviews();
      appendLog("GUI Wails pronta.");
    }

    async function loadTwainDevices() {
      appendLog("Lettura dispositivi TWAIN in corso...");
      const result = await app().ListTWAINDevices();
      const devices = result.devices || [];

      scanDeviceList.innerHTML = "";
      const defaultOpt = document.createElement("option");
      defaultOpt.value = "";
      defaultOpt.textContent = devices.length ? "(seleziona dispositivo)" : "(nessun dispositivo trovato)";
      scanDeviceList.appendChild(defaultOpt);

      devices.forEach((deviceName) => {
        const opt = document.createElement("option");
        opt.value = deviceName;
        opt.textContent = deviceName;
        scanDeviceList.appendChild(opt);
      });

      appendLog(`Dispositivi TWAIN trovati: ${devices.length}`);
    }

    document.getElementById("btnPickOutput").addEventListener("click", async () => {
      try {
        const selected = await app().SelectOutputDir(outputPath.value || "");
        if (selected) outputPath.value = selected;
      } catch (err) {
        appendLog(`Errore selezione cartella output: ${err}`);
      }
    });

    document.getElementById("btnPickInput").addEventListener("click", async () => {
      try {
        const selected = await app().SelectInputFile(inputPath.value || "");
        if (selected) inputPath.value = selected;
      } catch (err) {
        appendLog(`Errore selezione file: ${err}`);
      }
    });

    document.getElementById("btnProcess").addEventListener("click", async () => {
      if (!inputPath.value.trim()) {
        alert("Seleziona un file immagine.");
        return;
      }
      try {
        appendLog("Avvio elaborazione file...");
        const result = await app().ProcessFile({
          input: inputPath.value,
          output: outputPath.value,
          jpgQuality: parseInt(jpgQuality.value, 10) || 95,
          autoRotateCrops: autoRotate.checked,
          enhanceCrops: enhanceCrops.checked,
          addBorder: addBorder.checked,
        });
        await updateResult(result);
      } catch (err) {
        appendLog(`Errore elaborazione file: ${err}`);
        alert("Operazione fallita. Controlla il log.");
      }
    });

    document.getElementById("btnScanTwain").addEventListener("click", async () => {
      try {
        const dpi = parseInt(scanDpi.value, 10) || 300;
        appendLog(`Avvio scansione TWAIN a ${dpi} DPI...`);

        const scanPreview = await app().PreviewTWAINScanCommand({
          output: outputPath.value,
          dpi,
          device: scanDevice.value || "",
        });
        appendLog(`Eseguo NAPS2: ${scanPreview}`);

        const scannedPath = await app().ScanPhotoTWAIN({
          output: outputPath.value,
          dpi,
          device: scanDevice.value || "",
        });

        inputPath.value = scannedPath;
        appendLog(`Scansione completata: ${scannedPath}`);

        appendLog("Avvio elaborazione automatica dello scan...");
        const result = await app().ProcessFile({
          input: scannedPath,
          output: outputPath.value,
          jpgQuality: parseInt(jpgQuality.value, 10) || 95,
          autoRotateCrops: autoRotate.checked,
          enhanceCrops: enhanceCrops.checked,
          addBorder: addBorder.checked,
        });
        await updateResult(result);
      } catch (err) {
        appendLog(`Errore scansione/elaborazione TWAIN: ${err}`);
        alert("Scansione o elaborazione TWAIN fallita. Controlla il log.");
      }
    });

    document.getElementById("btnLoadTwainDevices").addEventListener("click", async () => {
      try {
        const listPreview = await app().PreviewListTWAINDevicesCommand();
        appendLog(`Eseguo NAPS2: ${listPreview}`);
        await loadTwainDevices();
      } catch (err) {
        appendLog(`Errore elenco dispositivi TWAIN: ${err}`);
        alert("Impossibile leggere i dispositivi TWAIN. Controlla il log.");
      }
    });

    scanDeviceList.addEventListener("change", () => {
      if (scanDeviceList.value) {
        scanDevice.value = scanDeviceList.value;
      }
    });

    document.getElementById("btnOpenOutput").addEventListener("click", async () => {
      try {
        await app().OpenOutputFolder(outputPath.value || "");
      } catch (err) {
        appendLog(`Errore apertura cartella output: ${err}`);
      }
    });

    window.addEventListener("DOMContentLoaded", loadDefaults);
  </script>
</body>
</html>
