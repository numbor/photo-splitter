<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Splitter Go</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap");

    :root {
      color-scheme: light;
      --bg-top: #f8f4ea;
      --bg-bottom: #e6f2f3;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --line: #d6dee8;
      --line-strong: #b8c5d4;
      --brand: #0f766e;
      --brand-strong: #0b5e58;
      --action: #2c4a7f;
      --action-strong: #20375f;
      --chip: #f4f7fb;
      --radius: 12px;
      --container-max: 1320px;
      --space-1: 6px;
      --space-2: 8px;
      --space-3: 10px;
      --space-4: 12px;
      --space-5: 14px;
      font-family: "Manrope", "Segoe UI Variable", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(1100px 460px at -5% -18%, #f6d6a4 0%, transparent 60%),
        radial-gradient(920px 420px at 106% -10%, #b9dfe1 0%, transparent 62%),
        linear-gradient(170deg, var(--bg-top), var(--bg-bottom));
    }

    .container {
      max-width: var(--container-max);
      margin: 0 auto;
      padding: var(--space-3) var(--space-4) var(--space-4);
    }

    .header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: var(--space-2);
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .header p {
      margin: 1px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .top-layout {
      display: grid;
      grid-template-columns: minmax(420px, 1fr) minmax(420px, 1fr);
      gap: var(--space-3);
      margin-bottom: var(--space-2);
    }

    .panel {
      background: color-mix(in oklab, var(--card) 92%, #f3f6f9 8%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.06);
      padding: 10px;
    }

    .panel h2 {
      margin: 0 0 var(--space-2);
      font-size: 13px;
      font-weight: 750;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #334155;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--space-2);
      align-items: end;
    }

    .field-grid + .field-grid {
      margin-top: var(--space-2);
    }

    label {
      font-size: 11px;
      color: #475569;
      margin-bottom: 4px;
      display: block;
      font-weight: 650;
      letter-spacing: 0.03em;
    }

    input[type="text"], input[type="number"], select {
      width: 100%;
      height: 34px;
      padding: 5px 8px;
      border: 1px solid var(--line-strong);
      border-radius: 9px;
      background: white;
      color: var(--text);
      font: inherit;
      font-size: 13px;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.16);
    }

    .row {
      display: grid;
      grid-template-columns: 92px minmax(210px, 1fr) 142px;
      gap: var(--space-2);
      align-items: end;
    }

    .checks {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: var(--space-2);
      margin-top: var(--space-2);
      font-size: 14px;
    }

    .checks label {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 7px;
      min-height: 32px;
      padding: 5px 8px;
      border-radius: 9px;
      background: var(--chip);
      border: 1px solid #dbe5ef;
      font-size: 11px;
      color: #334155;
      font-weight: 600;
      letter-spacing: normal;
      line-height: 1.3;
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
      overflow-wrap: anywhere;
      align-items: flex-start;
    }

    .checks input[type="checkbox"] {
      width: 14px;
      height: 14px;
      margin: 0;
      flex: 0 0 auto;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: var(--space-2);
      margin-top: var(--space-2);
    }

    .scan-status {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      color: #0b5e58;
      font-size: 12px;
      font-weight: 700;
    }

    .scan-status.visible {
      display: inline-flex;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid #b7d8d4;
      border-top-color: #0f766e;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    button {
      border: 1px solid #c3cfdd;
      border-radius: 9px;
      height: 34px;
      padding: 0 10px;
      cursor: pointer;
      background: #f7fafc;
      color: #1e293b;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.12);
    }

    button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    button.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: white;
    }

    button.primary:hover {
      background: var(--brand-strong);
      border-color: var(--brand-strong);
    }

    button.secondary {
      background: var(--action);
      border-color: var(--action);
      color: white;
    }

    button.secondary:hover {
      background: var(--action-strong);
      border-color: var(--action-strong);
    }

    .content {
      margin-top: var(--space-2);
      display: grid;
      grid-template-columns: minmax(300px, 0.78fr) minmax(560px, 1.22fr);
      gap: var(--space-3);
    }

    .content .panel {
      min-height: 300px;
    }

    textarea {
      width: 100%;
      height: 100%;
      min-height: 310px;
      resize: none;
      border: 1px solid var(--line-strong);
      border-radius: 9px;
      padding: 8px 9px;
      font-family: "IBM Plex Mono", Consolas, monospace;
      font-size: 11px;
      line-height: 1.35;
      background: #fbfcff;
    }

    .previews {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: var(--space-2);
    }

    .photo-card {
      background: #fbfdff;
      border: 1px solid #d8e1ed;
      border-radius: 10px;
      padding: 8px;
    }

    .photo-card h4 {
      margin: 0 0 6px;
      font-size: 12px;
      font-weight: 700;
      color: #475569;
    }

    .preview {
      width: 100%;
      height: 112px;
      border: 1px solid #d7e0ec;
      border-radius: 7px;
      background: white;
      object-fit: contain;
    }

    .preview-clickable {
      cursor: zoom-in;
    }

    .preview-clickable:hover {
      border-color: #91a7c2;
    }

    .preview-empty {
      width: 100%;
      height: 112px;
      border: 1px solid #d7e0ec;
      border-radius: 7px;
      background: #f4f8fc;
      color: #94a3b8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .photo-card button {
      margin-top: 6px;
      width: 100%;
    }

    @media (max-width: 1060px) {
      .top-layout,
      .content {
        grid-template-columns: 1fr;
      }

      .row {
        grid-template-columns: 1fr;
      }

      .actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .checks {
        grid-template-columns: 1fr;
      }

      .previews {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .container {
        padding: 10px;
      }

      .header h1 {
        font-size: 19px;
      }

      .header p {
        font-size: 11px;
      }

      .field-grid {
        grid-template-columns: 1fr;
      }

      .field-grid button {
        width: 100%;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }

    @media (max-height: 920px) {
      .container {
        padding-top: 8px;
        padding-bottom: 10px;
      }

      .content .panel {
        min-height: 270px;
      }

      textarea {
        min-height: 280px;
      }

      .preview,
      .preview-empty {
        height: 96px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div>
        <h1>Photo Splitter</h1>
        <p>Scansione NAPS2, crop automatico e rotazione rapida in un unico flusso.</p>
      </div>
    </header>

    <div class="top-layout">
      <section class="panel">
        <h2>Percorsi</h2>

        <div class="field-grid">
          <div>
            <label>Cartella output</label>
            <input id="outputPath" type="text" />
          </div>
          <button id="btnPickOutput">Scegli...</button>
        </div>

        <div class="field-grid">
          <div>
            <label>Percorso immagine da elaborare</label>
            <input id="inputPath" type="text" />
          </div>
          <button id="btnPickInput">Apri file...</button>
        </div>
      </section>

      <section class="panel">
        <h2>Impostazioni Scanner</h2>

        <div class="row">
          <div>
            <label>JPG Quality</label>
            <input id="jpgQuality" type="number" min="1" max="100" value="90" />
          </div>
          <div>
            <label>Profilo scanner NAPS2</label>
            <select id="scanProfile"></select>
          </div>
          <div>
            <button id="btnReloadProfiles" style="width:100%;">Ricarica profili</button>
          </div>
        </div>

        <div class="checks">
          <label><input id="autoRotate" type="checkbox" checked /> Ruota automaticamente i crop di 90° a destra</label>
          <label><input id="enhanceCrops" type="checkbox" checked /> Migliora automaticamente i crop</label>
          <label><input id="addBorder" type="checkbox" checked /> Aggiungi bordo bianco all'immagine</label>
          <label><input id="useSubfolders" type="checkbox" checked /> Salva i crop in una sottocartella timestamp (se disattivato usa file sequenziali nella cartella output)</label>
        </div>

        <div class="actions">
          <button class="primary" id="btnScanNaps2">Scansiona con NAPS2</button>
          <button id="btnOpenNapsGui">Apri GUI NAPS2</button>
          <button class="secondary" id="btnProcess">Elabora file selezionato</button>
          <button id="btnOpenOutput">Apri cartella output</button>
        </div>
        <div class="scan-status" id="scanStatus" aria-hidden="true">
          <span class="spinner" aria-hidden="true"></span>
          <span>Scansione in corso...</span>
        </div>
      </section>
    </div>

    <div class="content">
      <section class="panel">
        <h2>Log Operazioni</h2>
        <textarea id="log" readonly></textarea>
      </section>

      <section class="panel">
        <h2>Anteprime Foto Croppate</h2>
        <div class="previews" id="previews"></div>
      </section>
    </div>
  </div>

  <script src="/wails/ipc.js"></script>
  <script src="/wails/runtime.js"></script>
  <script>
    const app = () => window.go.main.DesktopApp;
    const outputPath = document.getElementById("outputPath");
    const inputPath = document.getElementById("inputPath");
    const jpgQuality = document.getElementById("jpgQuality");
    const autoRotate = document.getElementById("autoRotate");
    const enhanceCrops = document.getElementById("enhanceCrops");
    const addBorder = document.getElementById("addBorder");
    const useSubfolders = document.getElementById("useSubfolders");
    const scanProfile = document.getElementById("scanProfile");
    const logBox = document.getElementById("log");
    const previews = document.getElementById("previews");
    const btnScanNaps2 = document.getElementById("btnScanNaps2");
    const scanStatus = document.getElementById("scanStatus");

    const photoPathState = ["", "", "", ""];
    const photoPreviewState = ["", "", "", ""];
    let scanInProgress = false;
    const prefsStorageKey = "photo-splitter-go.preferences.v1";

    function getFileName(path) {
      const raw = (path || "").trim();
      if (!raw) return "";
      const normalized = raw.replace(/\\/g, "/");
      const parts = normalized.split("/");
      return parts[parts.length - 1] || "";
    }

    function getRelativePath(basePath, fullPath) {
      const base = (basePath || "").trim().replace(/\\/g, "/").replace(/\/+$/, "");
      const full = (fullPath || "").trim().replace(/\\/g, "/");
      if (!base || !full) return "";

      const baseLower = base.toLowerCase();
      const fullLower = full.toLowerCase();
      if (fullLower === baseLower) return "";
      if (fullLower.startsWith(baseLower + "/")) {
        return full.slice(base.length + 1);
      }
      return "";
    }

    function appendLog(message) {
      const now = new Date();
      const ts = now.toTimeString().slice(0, 8);
      logBox.value += `[${ts}] ${message}\n`;
      logBox.scrollTop = logBox.scrollHeight;
    }

    function getUIPreferences() {
      return {
        outputPath: (outputPath.value || "").trim(),
        jpgQuality: parseInt(jpgQuality.value, 10) || 90,
        autoRotate: autoRotate.checked,
        enhanceCrops: enhanceCrops.checked,
        addBorder: addBorder.checked,
        useSubfolders: useSubfolders.checked,
        scanProfile: getSelectedProfile(),
      };
    }

    function saveUIPreferences() {
      try {
        localStorage.setItem(prefsStorageKey, JSON.stringify(getUIPreferences()));
      } catch (err) {
        appendLog(`Impossibile salvare preferenze locali: ${err}`);
      }
    }

    function loadUIPreferences() {
      try {
        const raw = localStorage.getItem(prefsStorageKey);
        if (!raw) return {};
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return {};
        return parsed;
      } catch {
        return {};
      }
    }

    function applyUIPreferences(prefs) {
      if (prefs.outputPath) outputPath.value = String(prefs.outputPath);

      if (Number.isFinite(Number(prefs.jpgQuality))) {
        const quality = Math.max(1, Math.min(100, Number(prefs.jpgQuality)));
        jpgQuality.value = String(quality);
      }

      if (typeof prefs.autoRotate === "boolean") autoRotate.checked = prefs.autoRotate;
      if (typeof prefs.enhanceCrops === "boolean") enhanceCrops.checked = prefs.enhanceCrops;
      if (typeof prefs.addBorder === "boolean") addBorder.checked = prefs.addBorder;
      if (typeof prefs.useSubfolders === "boolean") useSubfolders.checked = prefs.useSubfolders;
    }

    function applyPreferredScanProfile(preferredProfileName) {
      const preferred = (preferredProfileName || "").trim();
      if (!preferred || !scanProfile.options.length) return false;

      for (let i = 0; i < scanProfile.options.length; i++) {
        if ((scanProfile.options[i].value || "").trim() === preferred) {
          scanProfile.selectedIndex = i;
          return true;
        }
      }
      return false;
    }

    function setScanInProgress(value) {
      scanInProgress = value;
      btnScanNaps2.disabled = value;
      scanProfile.disabled = value;
      scanStatus.classList.toggle("visible", value);
      scanStatus.setAttribute("aria-hidden", value ? "false" : "true");
    }

    function renderPreviews() {
      previews.innerHTML = "";
      const showRelativePath = useSubfolders.checked;
      const outputBasePath = outputPath.value;

      for (let i = 0; i < 4; i++) {
        const card = document.createElement("div");
        card.className = "photo-card";

        const title = document.createElement("h4");
        const croppedFileName = getFileName(photoPathState[i]);
        title.textContent = croppedFileName || `Foto ${i + 1}`;

        if (showRelativePath && photoPathState[i]) {
          const relPath = getRelativePath(outputBasePath, photoPathState[i]);
          if (relPath) {
            const rel = document.createElement("small");
            rel.textContent = relPath;
            rel.style.display = "block";
            rel.style.marginTop = "4px";
            rel.style.color = "#67717d";
            rel.style.fontWeight = "500";
            title.appendChild(rel);
          }
        }

        let previewElement;
        if (photoPreviewState[i]) {
          const img = document.createElement("img");
          img.className = "preview";
          img.src = photoPreviewState[i];
          img.title = "Apri con visualizzatore immagini di sistema";
          img.classList.add("preview-clickable");
          img.addEventListener("click", async () => {
            if (!photoPathState[i]) return;
            try {
              await app().OpenImageWithSystemViewer(photoPathState[i]);
              appendLog(`Aperta Foto ${i + 1} nel visualizzatore di sistema.`);
            } catch (err) {
              appendLog(`Errore apertura Foto ${i + 1} nel visualizzatore: ${err}`);
            }
          });
          previewElement = img;
        } else {
          const empty = document.createElement("div");
          empty.className = "preview-empty";
          empty.textContent = "Nessuna anteprima";
          previewElement = empty;
        }

        const btn = document.createElement("button");
        btn.textContent = "Ruota 90°";
        btn.disabled = !photoPathState[i];
        btn.addEventListener("click", async () => {
          if (!photoPathState[i]) return;
          try {
            appendLog(`Rotazione foto ${i + 1} di 90 gradi...`);
            const updated = await app().RotatePhoto({
              input: photoPathState[i],
              angle: 90,
              jpgQuality: parseInt(jpgQuality.value, 10) || 95,
            });
            photoPathState[i] = updated;
            photoPreviewState[i] = await app().GetPhotoPreviewDataURL(updated);
            renderPreviews();
            appendLog(`Foto ${i + 1} ruotata con successo.`);
          } catch (err) {
            appendLog(`Errore rotazione foto ${i + 1}: ${err}`);
            alert("Rotazione fallita. Controlla il log.");
          }
        });

        card.appendChild(title);
        card.appendChild(previewElement);
        card.appendChild(btn);
        previews.appendChild(card);
      }
    }

    function getSelectedProfile() {
      return (scanProfile.value || "").trim();
    }

    async function loadScanProfiles() {
      scanProfile.innerHTML = "";
      try {
        const prefs = loadUIPreferences();
        const profiles = await app().ListNAPS2Profiles();
        if (!profiles || !profiles.length) {
          throw new Error("nessun profilo disponibile");
        }

        let selected = false;
        profiles.forEach((profile) => {
          const option = document.createElement("option");
          option.value = profile.displayName || "";
          option.textContent = profile.displayName || "(profilo senza nome)";
          if (profile.isDefault && !selected) {
            option.selected = true;
            selected = true;
          }
          scanProfile.appendChild(option);
        });

        if (!selected && scanProfile.options.length > 0) {
          scanProfile.selectedIndex = 0;
        }

        if (applyPreferredScanProfile(prefs.scanProfile)) {
          appendLog(`Profilo scanner ripristinato: ${getSelectedProfile()}`);
        }

        appendLog(`Profili NAPS2 caricati: ${scanProfile.options.length}`);
        saveUIPreferences();
      } catch (err) {
        const fallback = document.createElement("option");
        fallback.value = "";
        fallback.textContent = "Nessun profilo trovato";
        scanProfile.appendChild(fallback);
        appendLog(`Errore caricamento profili NAPS2: ${err}`);
      }
    }

    async function updateResult(result) {
      const photos = result.photos || [];
      for (let i = 0; i < 4; i++) {
        const photoPath = photos[i] || "";
        photoPathState[i] = photoPath;
        photoPreviewState[i] = photoPath ? await app().GetPhotoPreviewDataURL(photoPath) : "";
      }
      renderPreviews();
      (result.logs || []).forEach(appendLog);
      if (result.outputDir) appendLog(`OUTPUT_DIR=${result.outputDir}`);
      if (result.borderedPath) appendLog(`BORDERED=${result.borderedPath}`);
      photos.forEach((path) => appendLog(`PHOTO=${path}`));
      appendLog("Operazione completata.");
    }

    async function loadDefaults() {
      outputPath.value = await app().DefaultOutputDir();
      const prefs = loadUIPreferences();
      applyUIPreferences(prefs);
      renderPreviews();
      appendLog("GUI Wails pronta.");
      try {
        appendLog("Verifica disponibilita NAPS2 portable...");
        const bootstrapMsg = await app().EnsureNAPS2Portable();
        if (bootstrapMsg) {
          appendLog(bootstrapMsg);
        }
      } catch (err) {
        appendLog(`Bootstrap NAPS2 fallito: ${err}`);
      }
      await loadScanProfiles();
      appendLog("Preferenze locali ripristinate.");
    }

    document.getElementById("btnPickOutput").addEventListener("click", async () => {
      try {
        const selected = await app().SelectOutputDir(outputPath.value || "");
        if (selected) {
          outputPath.value = selected;
          saveUIPreferences();
        }
      } catch (err) {
        appendLog(`Errore selezione cartella output: ${err}`);
      }
    });

    document.getElementById("btnPickInput").addEventListener("click", async () => {
      try {
        const selected = await app().SelectInputFile(inputPath.value || "");
        if (selected) inputPath.value = selected;
      } catch (err) {
        appendLog(`Errore selezione file: ${err}`);
      }
    });

    document.getElementById("btnProcess").addEventListener("click", async () => {
      if (!inputPath.value.trim()) {
        alert("Seleziona un file immagine.");
        return;
      }
      try {
        appendLog("Avvio elaborazione file...");
        const result = await app().ProcessFile({
          input: inputPath.value,
          output: outputPath.value,
          jpgQuality: parseInt(jpgQuality.value, 10) || 95,
          autoRotateCrops: autoRotate.checked,
          enhanceCrops: enhanceCrops.checked,
          addBorder: addBorder.checked,
          useSubfolders: useSubfolders.checked,
        });
        await updateResult(result);
      } catch (err) {
        appendLog(`Errore elaborazione file: ${err}`);
        alert("Operazione fallita. Controlla il log.");
      }
    });

    btnScanNaps2.addEventListener("click", async () => {
      if (scanInProgress) return;
      try {
        const profile = getSelectedProfile();
        if (!profile) {
          alert("Seleziona un profilo scanner prima di avviare la scansione.");
          return;
        }
        appendLog(`Avvio scansione NAPS2 con profilo: ${profile}`);

        let scannedPath = "";
        setScanInProgress(true);
        try {
          const scanPreview = await app().PreviewNAPS2ScanCommand({
            output: outputPath.value,
            profile,
          });
          appendLog(`Eseguo NAPS2: ${scanPreview}`);

          scannedPath = await app().ScanWithNAPS2({
            output: outputPath.value,
            profile,
          });
        } finally {
          setScanInProgress(false);
        }

        inputPath.value = scannedPath;
        appendLog(`Scansione completata: ${scannedPath}`);

        appendLog("Avvio elaborazione automatica dello scan...");
        const result = await app().ProcessFile({
          input: scannedPath,
          output: outputPath.value,
          jpgQuality: parseInt(jpgQuality.value, 10) || 95,
          autoRotateCrops: autoRotate.checked,
          enhanceCrops: enhanceCrops.checked,
          addBorder: addBorder.checked,
          useSubfolders: useSubfolders.checked,
        });
        await updateResult(result);
      } catch (err) {
        appendLog(`Errore scansione/elaborazione NAPS2: ${err}`);
        alert("Scansione o elaborazione NAPS2 fallita. Controlla il log.");
      }
    });

    document.getElementById("btnReloadProfiles").addEventListener("click", async () => {
      await loadScanProfiles();
    });

    outputPath.addEventListener("change", saveUIPreferences);
    outputPath.addEventListener("change", renderPreviews);
    inputPath.addEventListener("change", renderPreviews);
    jpgQuality.addEventListener("change", saveUIPreferences);
    autoRotate.addEventListener("change", saveUIPreferences);
    enhanceCrops.addEventListener("change", saveUIPreferences);
    addBorder.addEventListener("change", saveUIPreferences);
    useSubfolders.addEventListener("change", saveUIPreferences);
    useSubfolders.addEventListener("change", renderPreviews);
    scanProfile.addEventListener("change", saveUIPreferences);

    document.getElementById("btnOpenNapsGui").addEventListener("click", async () => {
      try {
        appendLog("Avvio interfaccia GUI NAPS2...");
        const guiPath = await app().LaunchNAPS2GUI();
        appendLog(`GUI NAPS2 avviata: ${guiPath}`);
      } catch (err) {
        appendLog(`Errore avvio GUI NAPS2: ${err}`);
        alert("Impossibile avviare la GUI di NAPS2. Controlla il log.");
      }
    });

    document.getElementById("btnOpenOutput").addEventListener("click", async () => {
      try {
        await app().OpenOutputFolder(outputPath.value || "");
      } catch (err) {
        appendLog(`Errore apertura cartella output: ${err}`);
      }
    });

    window.addEventListener("DOMContentLoaded", loadDefaults);
  </script>
</body>
</html>
